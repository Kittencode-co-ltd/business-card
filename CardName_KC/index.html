<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Business Card</title>
    <link rel="stylesheet" href="style.css">
    <!-- Optional: Google Fonts for a premium feel if we add text later -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scene">
        <div class="card" id="business-card">
            <div class="card__face card__face--front">
                <img src="main page.png" alt="Front of Business Card">
            </div>
            <div class="card__face card__face--back">
                <img src="back page.png" alt="Back of Business Card">
            </div>
        </div>
    </div>
    
    <div class="footer">
        Powered by <strong>Kitten Code</strong>
    </div>

    <script src="script.js"></script>
</body>
</html>
