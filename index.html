<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Business Card</title>
    <link rel="stylesheet" href="style.css">
    <!-- Optional: Google Fonts for a premium feel if we add text later -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="scene">
        <div class="card" id="business-card">
            <div class="card__face card__face--front">
                <img src="main page.png" alt="Front of Business Card">
            </div>
            <div class="card__face card__face--back">
                <img src="back page.png" alt="Back of Business Card">
            </div>
        </div>
    </div>

    <div class="social-links">
        <a href="https://www.facebook.com/profile.php?id=61578657051567" target="_blank" title="Facebook" class="social-btn social-btn--facebook">
            <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.instagram.com/kitten.code" target="_blank" title="Instagram" class="social-btn social-btn--instagram">
            <i class="bi bi-instagram"></i>
        </a>
        <a href="https://kittencode-co-ltd.github.io/Kitten-Code/index.html" target="_blank" title="Website" class="social-btn social-btn--website">
            <i class="bi bi-globe2"></i>
        </a>
    </div>
    <div class="footer">
        Powered by <strong>Kitten Code Co., Ltd.</strong>
    </div>

    <script src="script.js"></script>
</body>

</html>
